services:
  app:
    build:
      context: .
      dockerfile: AppDockerfile
    expose:
      - "3000"
    tty: true
    restart: always

  nginx:
    build: ./nginx
    ports:
      - "443:443"
    volumes:
      - /etc/nginx/certs:/etc/nginx/certs:ro

    depends_on:
      - app
    restart: always
