services:
  app:
    build:
      context: .
      dockerfile: AppDockerfile
    container_name: next
    ports:
      - "3000:3000"
    user: "node"
    volumes:
      - ../app/:/home/node/app
    tty: true
    networks:
      - shared

networks:
  shared:
    external: true
    name: shared_network
